apiVersion: tekton.dev/v1beta1
kind: EventListener
metadata:
  name: workspace
spec:
  triggers:
    - binding:
        name: simple-binding
      template:
        name: trigger-workspace
---
apiVersion: tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: simple-binding

---
apiVersion: tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: trigger-workspace
spec:
  resourcetemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pipelinerun-$(uid)-pvc
      spec:
        resources:
          requests:
            storage:  1Gi
        volumeMode: Filesystem
        accessModes:
          - ReadWriteOnce
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        name: pipelinerun-$(uid)
      spec:
        pipelineRef:
            name: pipeline-workspace
        workspaces:
          - name: pipeline-workspace
            persistentVolumeClaim:
              claimName: pipelinerun-$(uid)-pvc

# -------------------------------
# Pipeline: pipeline-workspace
# -------------------------------
---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: pipeline-workspace
spec:
  workspaces:
    - name: pipeline-workspace
  tasks:
    # New task to show workspace path and contents
    - name: show-git
      workspaces:
        - name: task-workspace
          workspace: pipeline-workspace
      taskRef:
        name: show-git-location

    # Existing tasks now run after 'show-git'
    - name: task1
      workspaces:
        - name: task-workspace
          workspace: pipeline-workspace
      taskRef:
        name: task-workspace
      runAfter:
        - show-git

    - name: task2
      workspaces:
        - name: task-workspace
          workspace: pipeline-workspace
      taskRef:
        name: task-workspace
      runAfter:
        - task1
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: show-git-location
spec:
  workspaces:
  - name: task-workspace
  steps:
    - name: show-layout
      image: ubuntu
      script: |
        #!/bin/bash
        set -x

        echo "=== Workspace Path ==="
        echo "$(workspaces.task-workspace.path)"

        echo "=== Listing Workspace ==="
        ls -R "$(workspaces.task-workspace.path)"

        echo "=== Listing /workspace ==="
        ls -R /workspace || true

        echo "=== Searching for .git directories ==="
        find / -maxdepth 4 -name ".git" 2>/dev/null || echo "No .git directories found"

        echo "=== Done ==="
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: task-workspace
spec:
  workspaces:
  - name: task-workspace 
  steps:
    - name: echoenvvar
      image: ubuntu
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -x
          echo 00 lab3
          WS=$(workspaces.task-workspace.path)
          ls $WS
          cd $WS
          echo hi >> hi
          ls $WS
          cat hi

